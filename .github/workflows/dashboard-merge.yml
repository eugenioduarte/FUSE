name: Dashboard Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: dashboard-merge
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    name: Generate and deploy dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://eugenioduarte.github.io/FUSE/

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate dashboard
        run: bash .github/scripts/generate-dashboard.sh

      - name: Generate analytics
        run: bash .github/scripts/generate-analytics.sh

      - name: Generate AI system page
        run: bash .github/scripts/generate-ai-system.sh

      - name: Commit generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/demonstration-orchestration.html docs/analytics.html docs/ai-system.html
          git commit -m "chore: update dashboard [skip ci]" || true
          git push || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
